<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="fc">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#006039"/>
  <!-- Mini paddle icon — white on green -->
  <!-- Head -->
  <rect x="5" y="6" width="18" height="20" rx="6" ry="6"
    fill="none" stroke="white" stroke-width="1.8"/>
  <!-- Two stripes -->
  <line x1="5" y1="13" x2="23" y2="13" stroke="white" stroke-width="1.3" clip-path="url(#fc)"/>
  <line x1="5" y1="17" x2="23" y2="17" stroke="white" stroke-width="1.3" clip-path="url(#fc)"/>
  <!-- Wedge -->
  <polygon points="5,20 23,15 23,26 5,26" fill="white" clip-path="url(#fc)"/>
  <!-- Ball -->
  <circle cx="14" cy="20" r="3" fill="#006039" clip-path="url(#fc)"/>
  <!-- Handle -->
  <rect x="23" y="13" width="7" height="6" rx="3"
    fill="none" stroke="white" stroke-width="1.8"/>
</svg>
